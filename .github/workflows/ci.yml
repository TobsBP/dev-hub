name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dev-hub

    env:
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: dev-hub/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build da aplicacao
        run: npm run build

      - name: Rodar aplicacao
        run: npm start > /tmp/server.log 2>&1 &

      - name: Esperar servidor subir
        run: sleep 5 && npx wait-on http://localhost:3000/api/auth/providers --timeout 60000 --interval 2000 || (cat /tmp/server.log && exit 1)

      - name: Rodar testes Cypress
        run: npx cypress run
